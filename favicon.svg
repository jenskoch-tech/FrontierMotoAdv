<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">

  <!-- Background square with slight rounding -->
  <rect width="100" height="100" fill="#0a0a0a" rx="18"/>

  <!-- Mountain icon, centred and scaled up -->
  <g transform="translate(50,50) scale(1.55) translate(-24,-24)">
    <polyline points="3,42 14,18 22,30 29,18 45,42"
      fill="none" stroke="white" stroke-width="3.5"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Amber dot bottom-right -->
  <circle cx="67" cy="63" r="9" fill="#d97706"/>
  <circle cx="67" cy="63" r="9" fill="none" stroke="#0a0a0a" stroke-width="3.5"/>

</svg>
